services:
  # 1. Primary Text Model (35B) - VLLM Text
  vllm-text:
    image: vllm/vllm-openai:latest
    container_name: vllm-text
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ipc: host
    ports:
      - "8000:8000"
    volumes:
      - ${HF_CACHE_DIR:-/mnt/vllm-cache/huggingface}:/root/.cache/huggingface
    command:
      - --model
      - ${VLLM_TEXT_MODEL:-Qwen/Qwen3.6-27B-FP8}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --api-key
      - ${VLLM_API_KEY:-local-dev-key}
      - --gpu-memory-utilization
      - "0.60" # Allocates ~48GB (60% of 80GB)
      - --max-model-len
      - "32768"
      - --max-num-seqs
      - "64"
      - --enable-chunked-prefill
      - --trust-remote-code

  # 2. Vision Model (9B) - VLLM Vision
  vllm-vision:
    image: vllm/vllm-openai:latest
    container_name: vllm-vision
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ipc: host
    ports:
      - "8001:8001"
    volumes:
      - ${HF_CACHE_DIR:-/mnt/vllm-cache/huggingface}:/root/.cache/huggingface
    command:
      - --model
      - ${VLLM_VISION_MODEL:-Qwen/Qwen3-VL-8B-Instruct}
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --api-key
      - ${VLLM_API_KEY:-local-dev-key}
      - --gpu-memory-utilization
      - "0.30" # Increased from 0.20 to allow for KV cache blocks
      - --max-model-len
      - "8192" # Vision models are token-heavy; keep this reasonable
      - --trust-remote-code


  # 3. TEI Embedding
  tei-embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:hopper-1.9
    container_name: tei-embedding
    restart: unless-stopped
    runtime: nvidia
    shm_size: 1g
    ports:
      - "8081:80"
    volumes:
      - ${HF_CACHE_DIR:-/mnt/vllm-cache/huggingface}:/data
    command:
      - --model-id
      - ${EMBEDDING_MODEL_ID:-Qwen/Qwen3-Embedding-0.6B}
      - --hostname
      - 0.0.0.0
      - --port
      - "80"
      - --max-batch-tokens
      - "16384"
      - --auto-truncate

  # 4. TEI Reranker
  tei-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:hopper-1.9
    container_name: tei-reranker
    restart: unless-stopped
    runtime: nvidia
    shm_size: 1g
    ports:
      - "8082:80"
    volumes:
      - ${HF_CACHE_DIR:-/mnt/vllm-cache/huggingface}:/data
    command:
      - --model-id
      - ${RERANKER_MODEL_ID:-BAAI/bge-reranker-v2-m3}
      - --hostname
      - 0.0.0.0
      - --port
      - "80"
      - --max-batch-tokens
      - "16384"
      - --auto-truncate

  # 5. Docproc (PDF split/merge/GLM-4V Router)
  docproc:
    build:
      context: ../indian-alt-docproc
      dockerfile: Dockerfile
    image: india-alt-docproc:latest
    container_name: docproc
    restart: unless-stopped
    env_file:
      - ../indian-alt-docproc/docproc.env
    ports:
      - "8100:8100"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8100
      --workers 12
      --h11-max-incomplete-event-size 524288000
      --timeout-keep-alive 600
      --timeout-graceful-shutdown 600
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 5