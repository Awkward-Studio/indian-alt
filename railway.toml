[deploy]
# Health check for deployment
healthcheckPath = "/api/core/health/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Release command runs migrations and one-time fixes BEFORE the web container starts.
# This prevents long-running migrations from causing health check timeouts.
releaseCommand = "bash release.sh"
