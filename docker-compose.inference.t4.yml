services:
  # T4 profile: keep the LLM as the only GPU workload.
  # Run embeddings/reranking on CPU to avoid VRAM contention on 16GB cards.
  vllm-text:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    container_name: vllm-text-t4
    restart: unless-stopped
    ipc: host
    shm_size: 8g
    ports:
      - "${VLLM_PORT:-8000}:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-local-dev-key}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
    volumes:
      - ${HF_CACHE_DIR:-/mnt/vllm-cache/huggingface}:/root/.cache/huggingface
    command:
      - ${VLLM_TEXT_MODEL}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --api-key
      - ${VLLM_API_KEY:-local-dev-key}
      - --dtype
      - ${VLLM_DTYPE:-half}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.82}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-8192}
      - --max-num-seqs
      - ${VLLM_MAX_NUM_SEQS:-4}
      - --max-num-batched-tokens
      - ${VLLM_MAX_NUM_BATCHED_TOKENS:-8192}
      - --cpu-offload-gb
      - ${VLLM_CPU_OFFLOAD_GB:-0}
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --generation-config
      - vllm
      - --trust-remote-code
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; req=urllib.request.Request('http://127.0.0.1:8000/v1/models', headers={'Authorization': 'Bearer ' + os.environ.get('VLLM_API_KEY', 'local-dev-key')}); urllib.request.urlopen(req, timeout=10).read()\""]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 180s

  tei-embedding:
    image: ${TEI_IMAGE:-ghcr.io/huggingface/text-embeddings-inference:cpu-1.9}
    container_name: tei-embedding-t4
    restart: unless-stopped
    shm_size: 1g
    ports:
      - "${EMBEDDING_PORT:-8081}:80"
    volumes:
      - ${HF_CACHE_DIR:-/mnt/vllm-cache/huggingface}:/data
    command:
      - --model-id
      - ${EMBEDDING_MODEL_ID:-Qwen/Qwen3-Embedding-0.6B}
      - --hostname
      - 0.0.0.0
      - --port
      - "80"
      - --max-batch-tokens
      - ${EMBEDDING_MAX_BATCH_TOKENS:-4096}
      - --auto-truncate
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  tei-reranker:
    image: ${TEI_IMAGE:-ghcr.io/huggingface/text-embeddings-inference:cpu-1.9}
    container_name: tei-reranker-t4
    restart: unless-stopped
    shm_size: 1g
    ports:
      - "${RERANKER_PORT:-8082}:80"
    volumes:
      - ${HF_CACHE_DIR:-/mnt/vllm-cache/huggingface}:/data
    command:
      - --model-id
      - ${RERANKER_MODEL_ID:-BAAI/bge-reranker-v2-m3}
      - --hostname
      - 0.0.0.0
      - --port
      - "80"
      - --max-batch-tokens
      - ${RERANKER_MAX_BATCH_TOKENS:-2048}
      - --auto-truncate
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
