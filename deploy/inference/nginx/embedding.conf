server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    location = /health {
        access_log off;
        return 200 "ok\n";
    }

    # Django currently posts to /embeddings, while TEI commonly exposes
    # the OpenAI-compatible route at /v1/embeddings.
    location = /embeddings {
        proxy_pass http://tei-embedding:80/v1/embeddings;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Pass through the native TEI route as well for direct debugging.
    location /v1/embeddings {
        proxy_pass http://tei-embedding:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
